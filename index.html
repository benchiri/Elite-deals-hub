<!DOCTYPE html>
<html>
<head>
  <title>Elite Deals Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-amber-950 text-white">

<!-- NAV -->
<div class="flex justify-between p-5 border-b border-amber-700">
  <h1 class="text-amber-400 font-bold text-xl">Elite Deals Hub</h1>
  <a href="admin.html" class="text-gray-300">Admin</a>
</div>

<!-- HERO -->
<div class="text-center py-16 px-4">
  <h1 class="text-5xl font-bold text-amber-300">
    Stop Searching. Start Earning.
  </h1>
  <p class="mt-4 text-gray-300 max-w-xl mx-auto">
    CV Writing • Job Updates • Side Hustles • Freelance Income Opportunities in Kenya
  </p>

  <input id="phone" class="mt-6 p-2 text-black rounded" placeholder="07XXXXXXXX"/>

  <div class="mt-6 space-x-2">
    <button onclick="pay(500)" class="bg-amber-500 px-4 py-2 rounded">CV Service</button>
    <button onclick="pay(100)" class="bg-amber-600 px-4 py-2 rounded">Jobs</button>
    <button onclick="pay(200)" class="bg-amber-700 px-4 py-2 rounded">Hustles</button>
  </div>

  <a href="dashboard.html">
    <button class="mt-6 bg-green-500 px-6 py-2 rounded">Go to Dashboard</button>
  </a>
</div>

<script>
async function pay(amount){
  const phone = document.getElementById("phone").value;

  if(!phone){
    alert("Enter phone number");
    return;
  }

  alert("STK Request Sent (backend required) for " + phone + " amount " + amount);
}
</script>

</body>
</html>
